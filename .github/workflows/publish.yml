name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # creating GitHub Releases
  id-token: write    # OIDC token for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # npm 11.5.1+ does the GitHub OIDC → npm token exchange for trusted
      # publishing automatically. The npm bundled with Node 20 is 10.x,
      # which can sign provenance but can't auth the PUT. Force a recent
      # CLI so `npm publish --provenance` works without an NPM_TOKEN.
      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "Tag v$tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
